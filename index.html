<style>
    body { font-family: 'Inter', sans-serif; }
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        display: inline-block;
        vertical-align: middle;
    }
    .sidebar-active-fill {
        font-variation-settings: 'FILL' 1 !important;
    }
    .nav-item.active {
        background: linear-gradient(to right, #001f3d, #003461);
        color: white !important;
        border-right: 4px solid #60a5fa;
        transform: translateX(4px);
    }
    .nav-item.active span:first-child {
        font-variation-settings: 'FILL' 1;
    }
    .hidden-content {
        display: none;
    }
    .authoritative-gradient { background: linear-gradient(135deg, #001f3d 0%, #003461 100%); }
</style>
</head>
<body class="bg-surface text-on-surface flex overflow-hidden h-screen">

<!-- SideNavBar -->
<aside class="fixed left-0 top-0 h-full w-72 bg-[#001f3d]/90 dark:bg-slate-950/90 backdrop-blur-xl flex flex-col border-r border-blue-900/10 shadow-2xl shadow-blue-900/20 z-50">
<!-- ... senin mevcut sidebar HTML burada ... -->
</aside>

<!-- Content Shell -->
<main class="flex-1 ml-72 flex flex-col h-full overflow-hidden">
<!-- ... header ve dashboard vs tüm content HTML burada ... -->
</main>

<!-- Sidebar JS: Section geçişleri -->
<script>
  const navItems = document.querySelectorAll('.nav-item');
  const sections = document.querySelectorAll('.hidden-content, #dashboard');

  // Başlangıçta dashboard göster
  sections.forEach(sec => {
    if(sec.id === 'dashboard') {
      sec.classList.remove('hidden-content');
    } else {
      sec.classList.add('hidden-content');
    }
  });

  // Tıklama olayları
  navItems.forEach(item => {
    item.addEventListener('click', () => {
      const sectionId = item.dataset.section;

      // Tüm sectionları gizle
      sections.forEach(sec => sec.classList.add('hidden-content'));

      // Tüm nav-itemlardan active kaldır
      navItems.forEach(nav => nav.classList.remove('active'));

      // Tıklanan item active yap
      item.classList.add('active');

      // İlgili sectionu göster
      const targetSection = document.getElementById(sectionId);
      if(targetSection) {
        targetSection.classList.remove('hidden-content');
      }
    });
  });
</script>

</body>
</html>
